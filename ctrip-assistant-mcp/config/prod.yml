# 数据库配置
database:
  dialect: sqlite
  url: /Users/myuser/projects/db/travel.sqlite  # SQLite 数据库文件路径
  echo: false  # 生产环境设为false
  # SQLite 连接池简化配置
  pool_size: 5
  max_overflow: 10
  pool_recycle: -1  # SQLite 无需回收连接，设为-1
  
# #mysql 数据库配置
# database:
#   dialect: mysql
#   driver: pymysql
#   username: root
#   password: your_password
#   host: 127.0.0.1
#   port: 3306
#   database: school_db
#   charset: utf8mb4
