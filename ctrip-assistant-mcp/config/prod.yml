#   pool_size: 10  # 连接池大小
#   max_overflow: 20  # 连接池最大溢出数
#   pool_recycle: 3600  # 连接回收时间（秒）

# FastAPI配置
server:
  api:
    host: "127.0.0.1"
    port: 8000
    reload: true  # 热重载
    # 允许跨域请求的源
  origins: ['http://localhost:8080']
  white_list: ['/api/login', '/api/register', '/api/auth', '/docs', '/openapi.json', '/static', '/mcp.*']

jwt:
  secret_key: dummy
  algorithm: HS256
  access_token_expire_minutes: 30


# 智能体配置
llm:
  temperature: 0.1  # 开发环境低随机性
  verbose: true     # 打印详细日志
  url: http://127.0.0.1:6006/v1
  model_name: Qwen3-8B
  api_key: dummy
  temperature: 1
  max_tokens: 2000
graph:
  checkpointer:
    type: sqlite
    url: /Users/myuser/projects/db/graph_checkpoint.db
embedding:
  model: text-embedding-v4
  api_key: dummy
  dimension: 1024
  
# 新增日志配置
logging:
  level: "INFO"  # 开发环境显示所有级别日志
  format: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"
  handlers:
    - type: "console"  # 开发环境仅控制台输出
      formatter: "default"
  # 开发环境日志文件（可选）
  file:
    path: "logs/enterprise_practice_dev.log"
    max_size: "10MB"
    backup_count: 5

tavily:
  api_key: dummy

order_faq:
  path: /Users/myuser/projects/db/order_faq.md