# FastAPI配置
api:
  host: "127.0.0.1"
  port: 8000
  reload: true  # 热重载

# 智能体配置
llm:
  temperature: 0.1  # 开发环境低随机性
  verbose: true     # 打印详细日志
  url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key: 
  model_name: qwen3-max
  temperature: 1
  max_tokens: 2000
graph:
  checkpointer:
    type: sqlite
    url: /Users/caojianming/projects/mashibing/etrip-ai/mar15-ctrip-study/ctrip-agent/db/ctrip_graph_checkpoint.db
embedding:
  model: text-embedding-v4
  api_key: 
  dimension: 1024
  
# 新增日志配置
logging:
  level: "INFO"  # 开发环境显示所有级别日志
  format: "%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s"
  handlers:
    - type: "console"  # 开发环境仅控制台输出
      formatter: "default"
  # 开发环境日志文件（可选）
  file:
    path: "logs/ctrip_assistant_dev.log"
    max_size: "10MB"
    backup_count: 5

tavily:
  api_key: 

order_faq:
  path: /Users/caojianming/projects/mashibing/etrip-ai/mar15-ctrip-study/ctrip-agent/db/order_faq.md